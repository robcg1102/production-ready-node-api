name: CI/CD
 
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
 
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: production-ready-node-api
 
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
 
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test
